<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Head-to-Head Voting</title>
    <meta name="description" content="A beautiful and dynamic web application for voting between two candidates.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-anim"></div>
    <canvas id="confetti-canvas"></canvas>
    <div class="container">
        <header>
            <h1>Make Your Choice</h1>
            <p>Click the vote buttons below to support your favorite candidate</p>
        </header>

        <!-- Live Progress Bar -->
        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill progress-fill-1" id="progress-1"></div>
                <div class="progress-fill progress-fill-2" id="progress-2"></div>
            </div>
            <div class="progress-labels">
                <span id="percent-1" class="percent percent-blue">0%</span>
                <span class="total-votes" id="total-votes">0 total votes</span>
                <span id="percent-2" class="percent percent-pink">0%</span>
            </div>
        </div>

        <div class="voting-arena">
            <!-- Candidate 1 -->
            <div class="candidate-card" id="card-1">
                <div class="avatar gradient-1" id="avatar-1">A</div>
                <h2 id="name-1">Candidate 1</h2>
                <div class="vote-count">
                    <span id="score-1">0</span> <span class="label">Votes</span>
                </div>
                <button class="vote-btn btn-1" onclick="vote(1)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-6 0v4"/><path d="M5 11h14a2 2 0 0 1 2 2v5a7 7 0 0 1-7 7h-4a7 7 0 0 1-7-7v-5a2 2 0 0 1 2-2z"/></svg>
                    Vote <span id="btn-name-1">Candidate 1</span>
                </button>
            </div>

            <!-- VS Badge -->
            <div class="vs-badge">VS</div>

            <!-- Candidate 2 -->
            <div class="candidate-card" id="card-2">
                <div class="avatar gradient-2" id="avatar-2">B</div>
                <h2 id="name-2">Candidate 2</h2>
                <div class="vote-count">
                    <span id="score-2">0</span> <span class="label">Votes</span>
                </div>
                <button class="vote-btn btn-2" onclick="vote(2)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-6 0v4"/><path d="M5 11h14a2 2 0 0 1 2 2v5a7 7 0 0 1-7 7h-4a7 7 0 0 1-7-7v-5a2 2 0 0 1 2-2z"/></svg>
                    Vote <span id="btn-name-2">Candidate 2</span>
                </button>
            </div>
        </div>

        <div class="controls">
            <button class="reset-btn" onclick="resetVotes()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reset All Votes
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
